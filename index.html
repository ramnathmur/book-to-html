<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F6F2EA;
    --surface: #FBF8F2;
    --ink: #1A1814;
    --ink-secondary: #6B6660;
    --accent-ember: #C2410C;
    --accent-moss: #3F6B4A;
    --accent-indigo: #3B4C7A;
    --max-width: 1280px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    font-variant-numeric: tabular-nums;
  }
  a { color: inherit; }

  .skip-link {
    position: absolute; left: -9999px; top: 12px;
    background: var(--ink); color: var(--surface);
    padding: 8px 16px; text-decoration: none; z-index: 100; border-radius: 4px;
  }
  .skip-link:focus { left: 16px; }

  /* Header */
  header {
    position: sticky; top: 0; height: 72px;
    background: var(--surface); z-index: 50;
    border-bottom: 1px solid transparent;
    transition: border-color 200ms ease-out;
  }
  header.scrolled { border-bottom-color: rgba(26,24,20,0.08); }
  .header-inner {
    max-width: var(--max-width); margin: 0 auto; height: 100%;
    padding: 0 32px; display: flex; align-items: center; gap: 24px;
  }
  .wordmark {
    font-family: 'Fraunces', serif; font-weight: 600;
    font-size: 22px; letter-spacing: -0.01em; text-decoration: none;
  }
  .tagline {
    font-size: 14px; color: var(--ink-secondary);
    font-style: italic; white-space: nowrap;
  }
  .header-spacer { flex: 1; }
  .book-count { color: var(--ink-secondary); font-size: 14px; }
  .search-input {
    width: 260px; padding: 10px 14px 10px 36px;
    background: var(--bg); border: 1px solid rgba(26,24,20,0.10);
    border-radius: 8px; font-family: inherit; font-size: 14px; color: var(--ink);
  }
  .search-input::placeholder { color: var(--ink-secondary); }
  .search-input:focus { outline: 2px solid var(--accent-ember); outline-offset: 2px; border-color: transparent; }
  .search-wrap {
    position: relative;
  }
  .search-icon {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    color: var(--ink-secondary); pointer-events: none; font-size: 14px;
  }

  /* Toolbar */
  .toolbar {
    max-width: var(--max-width); margin: 0 auto;
    padding: 20px 32px 12px;
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  }
  .view-toggle {
    display: flex; background: var(--surface);
    border: 1px solid rgba(26,24,20,0.10); border-radius: 8px;
    overflow: hidden;
  }
  .view-btn {
    padding: 8px 16px; border: none; background: none;
    font-family: inherit; font-size: 13px; font-weight: 500;
    color: var(--ink-secondary); cursor: pointer;
    transition: all 160ms ease-out;
    display: flex; align-items: center; gap: 6px;
  }
  .view-btn + .view-btn { border-left: 1px solid rgba(26,24,20,0.08); }
  .view-btn:hover { color: var(--ink); background: rgba(26,24,20,0.03); }
  .view-btn.active {
    background: var(--ink); color: var(--surface);
  }
  .view-btn svg { width: 16px; height: 16px; }

  .sort-select {
    padding: 8px 32px 8px 12px; border: 1px solid rgba(26,24,20,0.10);
    border-radius: 8px; background: var(--surface);
    font-family: inherit; font-size: 13px; color: var(--ink);
    cursor: pointer; appearance: none;
    background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%236B6660' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 12px center;
  }
  .sort-select:focus { outline: 2px solid var(--accent-ember); outline-offset: 2px; }
  .toolbar-spacer { flex: 1; }
  .result-count { font-size: 13px; color: var(--ink-secondary); }

  /* Grid view */
  .library-grid {
    max-width: var(--max-width); margin: 0 auto; padding: 12px 32px 64px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 24px;
  }
  .grid-card {
    background: var(--surface); border: 1px solid rgba(26,24,20,0.06);
    border-radius: 12px; overflow: hidden;
    text-decoration: none; color: var(--ink);
    transition: transform 180ms ease-out, box-shadow 180ms ease-out;
    display: flex; flex-direction: column;
  }
  .grid-card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(26,24,20,0.08); }
  .grid-card:focus-visible { outline: 2px solid var(--accent-ember); outline-offset: 2px; }
  .grid-cover {
    width: 100%; aspect-ratio: 3/4;
    position: relative; overflow: hidden;
    display: flex; align-items: flex-start; padding: 16px;
  }
  .grid-cover img {
    position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
  }
  .grid-cover-title {
    font-family: 'Fraunces', serif; font-weight: 500;
    font-size: 18px; line-height: 1.15; color: var(--ink);
    position: relative; z-index: 1; text-wrap: balance;
    max-height: calc(1.15em * 4); overflow: hidden; word-break: break-word;
  }
  .grid-info { padding: 14px 16px 16px; flex: 1; display: flex; flex-direction: column; }
  .grid-title {
    font-family: 'Fraunces', serif; font-weight: 600;
    font-size: 16px; line-height: 1.25;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .grid-author {
    color: var(--ink-secondary); font-size: 13px; margin-top: 4px;
  }
  .grid-meta {
    margin-top: auto; padding-top: 10px;
    font-size: 12px; color: var(--ink-secondary);
  }

  /* List view */
  .library-list {
    max-width: var(--max-width); margin: 0 auto; padding: 12px 32px 64px;
    display: none; flex-direction: column; gap: 2px;
  }
  .list-row {
    display: grid; grid-template-columns: 56px 1fr auto;
    gap: 20px; align-items: center; padding: 14px 16px;
    text-decoration: none; color: var(--ink);
    background: var(--surface); border-radius: 8px;
    transition: background 160ms ease-out;
  }
  .list-row:hover { background: rgba(26,24,20,0.03); }
  .list-row:focus-visible { outline: 2px solid var(--accent-ember); outline-offset: 2px; }
  .list-thumb {
    width: 56px; height: 72px; border-radius: 4px;
    overflow: hidden; position: relative;
    display: flex; align-items: flex-start; padding: 6px;
    border: 1px solid rgba(26,24,20,0.08);
  }
  .list-thumb img {
    position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
  }
  .list-thumb-title {
    font-family: 'Fraunces', serif; font-size: 8px; line-height: 1.1;
    position: relative; z-index: 1;
  }
  .list-body { min-width: 0; }
  .list-title { font-size: 15px; font-weight: 500; }
  .list-author { font-size: 13px; color: var(--ink-secondary); margin-top: 2px; }
  .list-blurb {
    font-size: 13px; color: var(--ink-secondary); margin-top: 6px; line-height: 1.45;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .list-date { font-size: 13px; color: var(--ink-secondary); white-space: nowrap; }

  /* Carousel view */
  .carousel-section {
    max-width: var(--max-width); margin: 0 auto;
    padding: 12px 0 64px; position: relative; display: none;
  }
  .carousel-wrap { position: relative; }
  .carousel-track {
    display: flex; gap: 24px; padding: 4px 32px 24px 32px;
    overflow-x: auto; scroll-snap-type: x mandatory; scroll-behavior: smooth;
    scrollbar-width: none;
  }
  .carousel-track::-webkit-scrollbar { display: none; }
  .c-card {
    flex: 0 0 300px; height: 520px;
    background: var(--surface); border: 1px solid rgba(26,24,20,0.06);
    border-radius: 12px; padding: 18px;
    scroll-snap-align: start;
    display: flex; flex-direction: column;
    text-decoration: none; color: var(--ink);
    transition: transform 180ms ease-out, box-shadow 180ms ease-out;
  }
  .c-card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(26,24,20,0.08); }
  .c-card:focus-visible { outline: 2px solid var(--accent-ember); outline-offset: 2px; }
  .c-cover {
    width: 100%; height: 280px; border-radius: 6px;
    border: 1px solid rgba(26,24,20,0.08);
    padding: 20px; position: relative; overflow: hidden;
    display: flex; align-items: flex-start;
  }
  .c-cover img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .c-cover-title {
    font-family: 'Fraunces', serif; font-weight: 500;
    font-size: 24px; line-height: 1.15; color: var(--ink);
    position: relative; z-index: 1; text-wrap: balance;
    max-height: calc(1.15em * 4); overflow: hidden; word-break: break-word;
  }
  .c-card-title {
    font-family: 'Fraunces', serif; font-weight: 600;
    font-size: 20px; line-height: 1.2; margin-top: 14px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .c-card-author { color: var(--ink-secondary); font-size: 14px; margin-top: 4px; }
  .c-card-blurb {
    font-size: 14px; line-height: 1.5; margin-top: 12px; flex: 1; overflow: hidden;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
  }
  .c-card-cta { margin-top: 12px; font-size: 14px; font-weight: 500; }

  .arrow {
    position: absolute; top: 50%; transform: translateY(-50%);
    width: 44px; height: 44px; border-radius: 50%;
    border: 1px solid rgba(26,24,20,0.12); background: var(--surface);
    color: var(--ink); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; line-height: 1;
    transition: opacity 160ms ease-out, background 160ms ease-out;
    z-index: 5;
  }
  .arrow:hover { background: var(--bg); }
  .arrow:focus-visible { outline: 2px solid var(--accent-ember); outline-offset: 2px; }
  .arrow.prev { left: 4px; }
  .arrow.next { right: 4px; }
  .arrow[aria-disabled="true"] { opacity: 0.3; cursor: not-allowed; pointer-events: none; }

  /* Popularity pills */
  .pill {
    display: inline-block; padding: 4px 8px; border-radius: 4px;
    font-size: 11px; font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.04em;
    background: rgba(26,24,20,0.08); color: var(--ink);
  }
  .pill-hot { background: var(--accent-ember); color: var(--surface); }
  .pill-grhigh { background: rgba(194,65,12,0.12); color: var(--ink); }

  /* Empty state */
  .empty-state {
    grid-column: 1 / -1;
    padding: 48px 24px; text-align: center;
    color: var(--ink-secondary); font-size: 15px;
  }

  /* Footer */
  footer {
    max-width: var(--max-width); margin: 0 auto;
    padding: 24px 32px; height: 80px;
    display: flex; align-items: center; gap: 24px;
    border-top: 1px solid rgba(26,24,20,0.08);
    font-size: 13px; color: var(--ink-secondary);
  }
  footer .wordmark { font-size: 16px; color: var(--ink); }
  footer .spacer { flex: 1; }

  /* Responsive */
  @media (max-width: 1024px) {
    .library-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
  }
  @media (max-width: 768px) {
    .header-inner { padding: 0 20px; gap: 12px; }
    .tagline { display: none; }
    .search-input { width: 180px; }
    .toolbar { padding: 16px 20px 8px; }
    .library-grid { padding: 12px 20px 48px; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 16px; }
    .library-list { padding: 12px 20px 48px; }
    .carousel-section { padding: 12px 0 48px; }
    .carousel-track { padding: 4px 20px 24px 20px; gap: 16px; }
    .c-card { flex: 0 0 270px; height: 480px; }
    .arrow { display: none; }
    .list-row { grid-template-columns: 48px 1fr auto; gap: 12px; padding: 12px; }
    .list-thumb { width: 48px; height: 62px; }
    .list-blurb { display: none; }
    footer { padding-left: 20px; padding-right: 20px; }
  }
  @media (max-width: 480px) {
    .library-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .c-card { flex: 0 0 85vw; }
    .book-count { display: none; }
    .view-btn span { display: none; }
    .view-btn { padding: 8px 12px; }
  }

  @media (prefers-reduced-motion: reduce) {
    html, .carousel-track { scroll-behavior: auto; }
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
    .grid-card:hover, .c-card:hover { transform: none; box-shadow: none; }
  }
</style>
</head>
<body>
<a class="skip-link" href="#library">Skip to library</a>

<header id="siteHeader">
  <div class="header-inner">
    <a href="#" class="wordmark">Library</a>
    <span class="tagline">A private shelf of long-reads</span>
    <span class="header-spacer"></span>
    <span class="book-count" id="bookCount"></span>
    <div class="search-wrap">
      <span class="search-icon">&#x1F50D;</span>
      <input type="search" class="search-input" placeholder="Search title or author…" id="searchInput" aria-label="Search library">
    </div>
  </div>
</header>

<div class="toolbar">
  <div class="view-toggle" role="radiogroup" aria-label="View mode">
    <button class="view-btn active" data-view="grid" role="radio" aria-checked="true" aria-label="Grid view">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>
      <span>Grid</span>
    </button>
    <button class="view-btn" data-view="list" role="radio" aria-checked="false" aria-label="List view">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="1" y1="3" x2="15" y2="3"/><line x1="1" y1="8" x2="15" y2="8"/><line x1="1" y1="13" x2="15" y2="13"/></svg>
      <span>List</span>
    </button>
    <button class="view-btn" data-view="carousel" role="radio" aria-checked="false" aria-label="Carousel view">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="4" y="2" width="8" height="12" rx="1.5"/><line x1="1" y1="5" x2="1" y2="11"/><line x1="15" y1="5" x2="15" y2="11"/></svg>
      <span>Carousel</span>
    </button>
  </div>

  <select class="sort-select" id="sortSelect" aria-label="Sort books">
    <option value="date-desc">Date added (newest)</option>
    <option value="date-asc">Date added (oldest)</option>
    <option value="title-asc">Title A → Z</option>
    <option value="title-desc">Title Z → A</option>
    <option value="author-asc">Author A → Z</option>
  </select>

  <span class="toolbar-spacer"></span>
  <span class="result-count" id="resultCount"></span>
</div>

<main id="library">
  <div class="library-grid" id="gridView"></div>
  <div class="library-list" id="listView"></div>
  <section class="carousel-section" id="carouselView" aria-label="Library carousel">
    <div class="carousel-wrap">
      <button class="arrow prev" id="prevBtn" aria-label="Previous">&lsaquo;</button>
      <div class="carousel-track" id="track" role="region" aria-roledescription="carousel" aria-label="Books" tabindex="0"></div>
      <button class="arrow next" id="nextBtn" aria-label="Next">&rsaquo;</button>
    </div>
  </section>
</main>

<footer>
  <span class="wordmark">Library</span>
  <span>Updated <span id="updatedDate"></span></span>
  <span class="spacer"></span>
</footer>

const ACCENT_TOKENS = ['--accent-moss', '--accent-indigo'];
const ROOT_STYLES = getComputedStyle(document.documentElement);
function accentHex(id) {
  let h = 0;
  for (let i = 0; i < id.length; i++) h = (h * 31 + id.charCodeAt(i)) | 0;
  return ROOT_STYLES.getPropertyValue(ACCENT_TOKENS[Math.abs(h) % ACCENT_TOKENS.length]).trim();
}
function tintBg(id) {
  const c = accentHex(id);
  return `background: color-mix(in srgb, ${c} 14%, var(--surface));`;
}
function abbrev(n) {
  if (n < 1000) return String(n);
  if (n < 1_000_000) return (n / 1000).toFixed(n < 10000 ? 1 : 0).replace(/\.0$/, '') + 'K';
  return (n / 1_000_000).toFixed(1).replace(/\.0$/, '') + 'M';
}
function formatDate(iso) {
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function popularityHTML(pop) {
  if (!pop || Object.keys(pop).length === 0) return '';
  if (pop.nyt) {
    const hot = pop.nyt.rank <= 10;
    return `<span class="pill ${hot ? 'pill-hot' : ''}">NYT #${pop.nyt.rank} · ${pop.nyt.weeks_on_list} wks</span>`;
  }
  if (pop.goodreads) {
    const cls = pop.goodreads.rating >= 4.3 ? 'pill-grhigh' : '';
    return `<span class="pill ${cls}">★ ${pop.goodreads.rating.toFixed(1)} · ${abbrev(pop.goodreads.ratings_count)}</span>`;
  }
  if (pop.editor_note) {
    return `<span class="pill">${escapeHtml(pop.editor_note)}</span>`;
  }
  return '';
}
function coverImg(book) {
  return book.cover_image ? `<img src="${escapeHtml(book.cover_image)}" alt="" loading="lazy" onerror="this.remove()">` : '';
}

let currentView = localStorage.getItem('lib-view') || 'grid';
let currentSort = localStorage.getItem('lib-sort') || 'date-desc';
let visibleBooks = [];

const gridView = document.getElementById('gridView');
const listView = document.getElementById('listView');
const carouselView = document.getElementById('carouselView');
const track = document.getElementById('track');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const searchInput = document.getElementById('searchInput');
const sortSelect = document.getElementById('sortSelect');

function sortBooks(books, key) {
  const sorted = [...books];
  switch (key) {
    case 'date-desc': return sorted.sort((a, b) => b.date_added.localeCompare(a.date_added));
    case 'date-asc': return sorted.sort((a, b) => a.date_added.localeCompare(b.date_added));
    case 'title-asc': return sorted.sort((a, b) => a.title.localeCompare(b.title));
    case 'title-desc': return sorted.sort((a, b) => b.title.localeCompare(a.title));
    case 'author-asc': return sorted.sort((a, b) => a.author.localeCompare(b.author));
    default: return sorted;
  }
}

function filterBooks() {
  const q = searchInput.value.trim().toLowerCase();
  let books = q
    ? BOOKS.filter(b => b.title.toLowerCase().includes(q) || b.author.toLowerCase().includes(q))
    : [...BOOKS];
  return sortBooks(books, currentSort);
}

function renderGrid(books) {
  if (books.length === 0) {
    gridView.innerHTML = '<div class="empty-state">No books match your search.</div>';
    return;
  }
  gridView.innerHTML = books.map(b => `
    <a class="grid-card" href="${escapeHtml(b.reader_path)}" target="_blank" rel="noopener noreferrer">
      <div class="grid-cover" style="${tintBg(b.id)}">
        <span class="grid-cover-title">${escapeHtml(b.title)}</span>
        ${coverImg(b)}
      </div>
      <div class="grid-info">
        <div class="grid-title">${escapeHtml(b.title)}</div>
        <div class="grid-author">${escapeHtml(b.author)}</div>
        <div class="grid-meta">${popularityHTML(b.popularity)}</div>
      </div>
    </a>
  `).join('');
}

function renderList(books) {
  if (books.length === 0) {
    listView.innerHTML = '<div class="empty-state">No books match your search.</div>';
    return;
  }
  listView.innerHTML = books.map(b => `
    <a class="list-row" href="${escapeHtml(b.reader_path)}" target="_blank" rel="noopener noreferrer">
      <div class="list-thumb" style="${tintBg(b.id)}">
        <span class="list-thumb-title">${escapeHtml(b.title)}</span>
        ${coverImg(b)}
      </div>
      <div class="list-body">
        <div class="list-title">${escapeHtml(b.title)}</div>
        <div class="list-author">${escapeHtml(b.author)}</div>
        <div class="list-blurb">${escapeHtml(b.blurb)}</div>
      </div>
      <div class="list-date">${formatDate(b.date_added)}</div>
    </a>
  `).join('');
}

function renderCarousel(books) {
  if (books.length === 0) {
    track.innerHTML = '<div class="empty-state">No books match your search.</div>';
    updateArrowState();
    return;
  }
  track.innerHTML = books.map(b => `
    <a class="c-card" href="${escapeHtml(b.reader_path)}" target="_blank" rel="noopener noreferrer">
      <div class="c-cover" style="${tintBg(b.id)}">
        <span class="c-cover-title">${escapeHtml(b.title)}</span>
        ${coverImg(b)}
      </div>
      <div class="c-card-title">${escapeHtml(b.title)}</div>
      <div class="c-card-author">by ${escapeHtml(b.author)}</div>
      <div class="c-card-blurb">${escapeHtml(b.blurb)}</div>
      <div class="c-card-cta">Read →</div>
    </a>
  `).join('');
  updateArrowState();
}

function setView(view) {
  currentView = view;
  localStorage.setItem('lib-view', view);
  document.querySelectorAll('.view-btn').forEach(btn => {
    const active = btn.dataset.view === view;
    btn.classList.toggle('active', active);
    btn.setAttribute('aria-checked', active);
  });
  gridView.style.display = view === 'grid' ? 'grid' : 'none';
  listView.style.display = view === 'list' ? 'flex' : 'none';
  carouselView.style.display = view === 'carousel' ? 'block' : 'none';
}

function render() {
  visibleBooks = filterBooks();
  renderGrid(visibleBooks);
  renderList(visibleBooks);
  renderCarousel(visibleBooks);
  document.getElementById('resultCount').textContent =
    visibleBooks.length === BOOKS.length ? '' : `${visibleBooks.length} of ${BOOKS.length}`;
}

document.querySelectorAll('.view-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    setView(btn.dataset.view);
    render();
  });
});

sortSelect.value = currentSort;
sortSelect.addEventListener('change', () => {
  currentSort = sortSelect.value;
  localStorage.setItem('lib-sort', currentSort);
  render();
});

searchInput.addEventListener('input', () => render());

function cardWidth() {
  const first = track.querySelector('.c-card');
  if (!first) return 300;
  const next = first.nextElementSibling;
  if (next) return next.getBoundingClientRect().left - first.getBoundingClientRect().left;
  return first.offsetWidth + 24;
}
function scrollToCard(idx) {
  track.scrollTo({ left: idx * cardWidth(), behavior: 'smooth' });
}
function activeIndex() {
  return Math.round(track.scrollLeft / cardWidth());
}
function updateArrowState() {
  const maxScroll = track.scrollWidth - track.clientWidth;
  prevBtn.setAttribute('aria-disabled', (track.scrollLeft <= 1 || maxScroll <= 1) ? 'true' : 'false');
  nextBtn.setAttribute('aria-disabled', (track.scrollLeft >= maxScroll - 1 || maxScroll <= 1) ? 'true' : 'false');
}
track.addEventListener('scroll', () => requestAnimationFrame(updateArrowState));
prevBtn.addEventListener('click', () => scrollToCard(Math.max(0, activeIndex() - 1)));
nextBtn.addEventListener('click', () => scrollToCard(activeIndex() + 1));
track.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') { e.preventDefault(); scrollToCard(activeIndex() + 1); }
  if (e.key === 'ArrowLeft')  { e.preventDefault(); scrollToCard(Math.max(0, activeIndex() - 1)); }
  if (e.key === 'Home')       { e.preventDefault(); scrollToCard(0); }
  if (e.key === 'End')        { e.preventDefault(); scrollToCard(visibleBooks.length - 1); }
});

const header = document.getElementById('siteHeader');
window.addEventListener('scroll', () => {
  header.classList.toggle('scrolled', window.scrollY > 24);
}, { passive: true });

function boot() {
  document.getElementById('bookCount').textContent =
    `${BOOKS.length} ${BOOKS.length === 1 ? 'book' : 'books'}`;
  const latest = BOOKS.map(b => b.date_added).sort().pop();
  document.getElementById('updatedDate').textContent = latest ? formatDate(latest) : '—';
  setView(currentView);
  render();
  window.addEventListener('resize', () => requestAnimationFrame(updateArrowState));
}
boot();
</script>
