</div><div id="filepos662104" class="calibre1"><a></a><p class="calibre10"><span class="calibre5">LAW 26</span></p><p class="calibre4"><span class="calibre5">KEEP YOUR HANDS CLEAN</span></p><p class="calibre4"><span class="calibre5">JUDGMENT</span></p><p class="calibre6"><span class="italic">You must seem a paragon of civility and efficiency: Your hands are never soiled by mistakes and nasty deeds. Maintain such a spotless appearance by using others as scapegoats and cat’s-paws to disguise your involvement.</span></p><div class="mbppagebreak" id="calibre_pb_40"></div>
